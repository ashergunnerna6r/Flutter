name: lingochat
description: "LingoChat - AI Translation Realtime Chat App built with Flutter & Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  
  # Firebase Core, Auth, Firestore, FCM
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  
  # Gemini AI SDK
  google_generative_ai: ^0.4.6
  
  # Utilities & Local Storage
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  provider: ^6.1.2
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
